<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Perins Theatre</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-blue-900 text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🎭 Perins Theatre Admin</h1>
            <ul class="flex gap-6">
                <li><a href="index.html" class="hover:text-blue-300">Home</a></li>
                <li><button id="logout-btn" class="hover:text-red-300 hidden">Logout</button></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-16">
        <div id="login-section" class="max-w-md mx-auto bg-gray-800 p-8 rounded-lg">
            <h1 class="text-3xl font-bold mb-8">Admin Login</h1>
            <input type="email" id="admin-email" placeholder="Email" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500">
            <input type="password" id="admin-password" placeholder="Password" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg font-bold hover:bg-blue-700 transition">
                Login
            </button>
            <p class="text-gray-400 text-sm mt-4">Demo: admin@perinstheatre.com / theatre2026</p>
        </div>

        <div id="admin-section" class="hidden">
            <h1 class="text-4xl font-bold mb-12">Admin Dashboard</h1>

            <!-- Add Event Form -->
            <div class="bg-gray-800 p-8 rounded-lg mb-8">
                <h2 class="text-2xl font-bold mb-6">Add New Event</h2>
                <input type="text" id="event-name" placeholder="Event Name" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500">
                <textarea id="event-description" placeholder="Description" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500 h-24"></textarea>
                <input type="date" id="event-date" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500">
                <input type="number" id="event-capacity" placeholder="Seat Capacity" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500">
                <input type="number" id="ticket-price" placeholder="Ticket Price" class="w-full bg-gray-700 text-white p-3 rounded-lg mb-4 border border-blue-500" step="0.01">
                <button id="add-event-btn" class="w-full bg-green-600 text-white py-3 px-6 rounded-lg font-bold hover:bg-green-700 transition">
                    Add Event
                </button>
            </div>

            <!-- Events List -->
            <div class="bg-gray-800 p-8 rounded-lg">
                <h2 class="text-2xl font-bold mb-6">Manage Events</h2>
                <div id="admin-events-list" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <footer class="bg-blue-900 text-white py-8 mt-16">
        <div class="container mx-auto text-center">
            <p>&copy; 2026 Perins School Theatre. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/firebase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
